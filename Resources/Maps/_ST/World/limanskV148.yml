    - type: Paper
      content: >2


        С сегодняшнего рейда вынесли

        10 медуз

        6 каменных цветков

        8 вывертов

        И пара штук грави

        Ненавижу это ебаную отчётность, но пахан требует её вести, будто бухгалтером нанялся, благо хоть деньги хорошие

        Ещё парни говорили что к ним приходили какие то фанатики и требовали уйти, но кто они блять такие чтобы такое требовать? Парни прогнали их по пути ранив одного, к счастью это дурни сообразили проследить за ними до их базы, скоро наведём им визит
