- type: entity
  parent: BaseMobMutant
  id: STMobPoppyFirefiles
  name: Poppy-firefiles
  suffix: ST, T2
  description: Sleep forever bitch
  components:
    - type: Damageable
      damageModifierSet: STMutantT2DamageModifierSet
    - type: DamageStateVisuals #dsv might be redundant with sprite and threshholds tbh
      states:
        Alive:
          Base: alive
        Critical:
          Base: dead
        Dead:
          Base: dead
    - type: Sprite
      drawdepth: Mobs
      sprite: _Stalker_EN/Mobs/Mutants/firefly.rsi
      layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: alive
    - type: MobThresholds
      thresholds:
        0: Alive
        25: Dead
    - type: MeleeWeapon
      attackRate: 0.4
      angle: 30
      range: 1
      animation: WeaponArcBite
      damage:
        types:
          Slash: 0.2
          Piercing: 0.2
    - type: BonusMeleeDamage
      heavyDamageMultiplier: 0.2
    - type: SolutionContainerManager # its a psy power dont worry about it
      solutions:
        melee:
          reagents:
          - ReagentId: ChloralHydrate
            Quantity: 60
    - type: MeleeChemicalInjector
      solution: melee
      transferAmount: 6
    - type: SpeedModifierContacts
      walkSpeedModifier: 0.75
      sprintSpeedModifier: 0.75
    - type: Physics
      bodyType: Dynamic
      fixedRotation: false
    - type: PointLight
      radius: 4
      energy: 2
      color: "#ea003b"
      castShadows: true
    - type: AmbientSound
      volume: -7
      range: 4
      sound:
        path: /Audio/_Stalker/Animals/firefly.ogg
    - type: STWeight
      self: 0.25
