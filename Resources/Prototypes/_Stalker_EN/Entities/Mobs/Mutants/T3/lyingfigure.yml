#Silent Hill Lying Figure by Nahuel
- type: entity
  parent: BaseMobMutant
  id: STMobMutantLyingFigure
  name: Lying Figure
  suffix: ST, T3, SH
  description: A fleshy creature, looks like patches of skin grafted together into a straight jacket. You're not sure where limbs start and end.
  components:
  - type: Sprite
    layers:
      - map: [ "enum.DamageStateVisualLayers.Base", "movement" ]
        sprite: /Textures/_Stalker_EN/Mobs/Mutants/lyingfigure.rsi
        state: alive-1
  - type: SpriteMovement
    movementLayers:
      movement:
        state: alive-3
    noMovementLayers:
      movement:
        state: alive-1
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive-1
      Dead:
        Base: dead
  - type: MobThresholds
    thresholds:
      0: Alive
      450: Dead
  - type: Damageable
    damageModifierSet: STMutantT3DamageModifierSet
  - type: Bloodstream
    bloodReagents:
      reagents:
      - ReagentId: MuteToxin
        Quantity: 1
    bloodMaxVolume: 100
  - type: SlowOnDamage
    speedModifierThresholds:
      400: 0.9
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_Stalker_EN/Mutants/lyingfigure_death.ogg
  - type: Butcherable
    spawned:
    - id: STFoodMeatSalo #Or some other kind of meat? or a new part, and parent it so it's easy to implement
      amount: 1
  - type: STWeight
    self: 65
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.5
    baseSprintSpeed: 3.5
  - type: MeleeWeapon
    attackRate: 0.7
    angle: 30
    range: 1.3
    soundHit:
          path: /Audio/_Stalker_EN/Mutants/lyingfigure_hit.ogg
          params:
           variation: 0.125
    soundSwing:
      path: /Audio/_Stalker_EN/Mutants/lyingfigure_miss.ogg
      params:
        variation: 0.125
    animation: WeaponArcSmash
    wideAnimation: WeaponArcSmash
    damage:
      types:
        Blunt: 25
        Burn: 10
        Toxin: 10
  - type: BonusMeleeDamage
    heavyDamageMultiplier: 1.5
  - type: StaminaDamageOnHit
    damage: 45
  - type: Puller
    needsHands: false
  - type: NPCRetaliation
    attackMemoryLength: 10 # 10 what?
  - type: NpcFactionMember
    factions:
    - Mutated
  - type: PassiveDamage
    allowedStates:
    - Alive
    - Critical
    damage:
      types:
        Burn: -100
        Toxin: -100
        Airloss: -100
        Psy: -100
        Radiation: -100
