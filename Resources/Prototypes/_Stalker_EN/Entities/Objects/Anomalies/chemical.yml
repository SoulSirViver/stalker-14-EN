- type: entity
  id: ZoneAnomalyBeer
  name: Beer
  parent: [ZoneAnomalyBaseChemical,STBaseToxic]
  suffix: Stalker, Kissel, Anomaly, Beer
  components:
    - type: PointLight
      radius: 3
      energy: 3
      color: "Yellow"
      castShadows: false
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: ZoneAnomalyEffectDamage
      damage:
        types:
          Caustic: 2
    - type: ZoneAnomalyEffectDestroy
      whitelist:
        tags:
        - STBolt
    - type: Sprite
      sprite: _Stalker_EN/Objects/Other/Anomalys/beer.rsi
      layers:
        - state: idle
          shader: unshaded
    - type: SyncSprite
    - type: STChemicalsDelivery
      reagent: Beer
      amount: 20
      deliverSound: /Audio/Items/hiss.ogg
      entry:
        id: STAcidicEffect
        amount: 2
    - type: ZoneAnomaly
      detectedLevel: 0
      preparingDelay: 0
      activationDelay: 0
      chargeTime: 0.05
    - type: ZoneArtifactSpawner
      artifacts:
        - id: null
          ratio: 140
        - id: ZoneArtifactBeer
          tier: 1
          ratio: 25

- type: entity
  id: ZoneAnomalyPoppyFieldInert
  name: Poppy Field Decor
  parent: ZoneAnomalyBase
  suffix: Stalker, Poppy Field, Anomaly
  components:
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: Sprite
      sprite: _Stalker_EN/Objects/Anomalies/poppyfield.rsi
      state: idle
    - type: ZoneAnomaly
      detectedLevel: 5
    - type: STAnomalyTips
      icon:
        sprite: /Textures/_Stalker/Interface/Overlays/anomaly_tips.rsi
        state: unknown
    - type: ZoneArtifactSpawner
      artifacts:
      - id: null
        ratio: 140
      - id: ZoneArtifactPellicle
        tier: 1
        ratio: 15
      - id: ZoneArtifactToxic
        tier: 1
        ratio: 15
      #- id: ZoneArtifactWeirdFlower
      #  tier: 3
      #  ratio: 2

