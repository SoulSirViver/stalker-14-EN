#-PIVO-UPDATE-

- type: entity
  id: ZoneAnomalyBeer
  name: Beer
  parent: [ZoneAnomalyBaseChemical,STBaseToxic]
  suffix: Stalker, Kissel, Anomaly, Beer
  components:
    - type: PointLight
      radius: 3
      energy: 3
      color: "Yellow"
      castShadows: false
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: ZoneAnomalyEffectDamage
      damage:
        types:
          Caustic: 2
    - type: ZoneAnomalyEffectDestroy
      whitelist:
        tags:
        - STBolt
    - type: Sprite
      sprite: _Stalker_EN/Objects/Other/Anomalys/beer.rsi
      layers:
        - state: idle
          shader: unshaded
    - type: SyncSprite
    - type: STChemicalsDelivery
      reagent: Beer
      amount: 20
      deliverSound: /Audio/Items/hiss.ogg
      entry:
        id: STAcidicEffect
        amount: 2
    - type: ZoneAnomaly
      detectedLevel: 0
      preparingDelay: 0
      activationDelay: 0
      chargeTime: 0.05
    - type: ZoneArtifactSpawner
      artifacts:
        - id: null
          ratio: 140
        - id: ZoneArtifactBeer
          tier: 1
          ratio: 25

- type: entity
  id: ZoneAnomalyPoppyFieldConditionalSpawner
  name: Poppy Field Decor
  parent: ZoneAnomalyBase
  suffix: Without abnormal properties
  components:
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: Sprite
      sprite: _Stalker_EN/Objects/Anomalies/poppyfield.rsi
      layers:
        - state: idle
          shader: unshaded
    - type: ZoneAnomaly
      detectedLevel: 3
      preparingDelay: 0
      activationDelay: 0
      chargeTime: 0.05

- type: entity
  id: ZoneAnomalyPoppyField
  name: Poppy Field
  parent: MarkerBase
  suffix: Stalker, Poppy Field, Anomaly
  components:
    - type: ApproachTrigger
    - type: Sprite
      sprite: _Stalker_EN/Objects/Anomalies/poppyfield.rsi
      layers:
        - state: idle
          shader: unshaded
    - type: SpawnOnApproach
      minAmount: 3
      maxAmount: 5
      maxOffset: 4
      minOffset: 6
      cooldown: 900
      chance: 1
      prototypes:
        - STMobPoppyFirefiles
      restricted:
        - STMobPoppyFirefiles
    - type: ConditionalSpawner
      prototypes:
        - ZoneAnomalyPoppyFieldConditionalSpawner
