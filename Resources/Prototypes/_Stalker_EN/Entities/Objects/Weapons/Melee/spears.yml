- type: entity
  name: Wooden Spear
  parent: Spear
  id: STSpearWood
  suffix: ST, Weapon
  description: Spear made out of wood from the zone. 
  components:
  - type: Sprite
    sprite: _Stalker_EN/Objects/Weapons/Melee/wooden_spear.rsi
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 18 #Not Final, Will be adjusted for the zone
        Mutant : 20
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 30 # Not Final, Will be adjusted for the zone
        Mutant : 30
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30 #excess damage avoids cost of spawning entities.
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          PartRodMetal1:
            min: 0
            max: 0
      - !type:DoActsBehavior
        acts: [ "Destruction" ]