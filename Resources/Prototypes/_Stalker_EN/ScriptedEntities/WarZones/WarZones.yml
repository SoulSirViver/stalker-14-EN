# lowest tier
# low points, low cooldown
- type: entity
  id: WarZoneEntity_CordonPigFarm
  parent: MarkerBase
  name: Cordon Pig Farm War Zone
  description: A physical marker for the Kordon War Zone.
  suffix: War Zone EN
  components:
  - type: WarZone
    proto: CordonPigFarm
    portalName: Cordon Pig Farm # im not sure what this comp is for
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Fixtures
    fixtures:
      trigger:
        shape:
          !type:PhysShapeCircle
          radius: 6
        hard: false
        mask:
        - MobMask
        layer:
        - MidImpassable
  - type: PointLight
    enabled: true
    radius: 7
    color: Cyan
    energy: 1

- type: stWarZone
  id: CordonPigFarm
  rewardPointsPerPeriod: 1
  rewardPeriod: 60 # 1 minute
  captureCooldownHours: 0.5
  captureTime: 120 # 2 minutes
  requirements:
  - !type:ZoneOwnershipRequirenment
    requiredZones: []

